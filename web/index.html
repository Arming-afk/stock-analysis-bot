<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Daily Signals</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Signals">
  <meta name="theme-color" content="#0b1220">
</head>
<body>
  <header class="top">
    <div class="top-row">
      <h1>Daily Signals</h1>
      <button id="push-btn" class="ghost" hidden>Enable alerts</button>
    </div>
    <p class="meta" id="meta">Loading…</p>
    <div class="summary" id="summary"></div>
  </header>

  <nav class="filters" id="filters">
    <button class="chip active" data-filter="ALL">All</button>
    <button class="chip" data-filter="BUY">Buy</button>
    <button class="chip" data-filter="SELL">Sell</button>
    <button class="chip" data-filter="WATCH">Watch</button>
    <button class="chip" data-filter="HOLD">Hold</button>
  </nav>

  <main id="cards"></main>

  <footer>
    <p>Not investment advice. Personal decision-support tool only.</p>
    <p class="tiny">Signals are produced by deterministic code. The written rationale is
      generated by a language model that narrates the decision and cannot change it.</p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
