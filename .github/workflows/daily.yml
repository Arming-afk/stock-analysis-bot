name: Daily run

on:
  schedule:
    # 21:30 UTC on weekdays = 17:30 EDT / 16:30 EST, after the US close.
    # GitHub runs scheduled jobs late under load, and can skip them entirely
    # during incidents. Treat the schedule as best-effort, not a guarantee.
    - cron: "30 21 * * 1-5"
  workflow_dispatch:
    inputs:
      only:
        description: "Comma-separated ticker subset (blank = full universe)"
        required: false
        default: ""
      no_news:
        description: "Skip the news/sentiment leg"
        type: boolean
        default: false
      dry_run:
        description: "Skip the push notification"
        type: boolean
        default: false

# Needed to commit the report back — the runner is wiped after every job, so
# the repo is where run history lives.
permissions:
  contents: write

concurrency:
  group: daily-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore portfolio from secret
        env:
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON }}
        run: |
          mkdir -p data
          if [ -n "$PORTFOLIO_JSON" ]; then
            printf '%s' "$PORTFOLIO_JSON" > data/portfolio.json
            python -c "import json;d=json.load(open('data/portfolio.json'));print(f\"portfolio: {len(d.get('holdings',[]))} holding(s), cash {d.get('cash',0)}\")"
          else
            echo "::warning::PORTFOLIO_JSON secret not set — running watchlist only, no holdings"
            echo '{"cash": 0, "holdings": []}' > data/portfolio.json
          fi

      - name: Run daily analysis
        env:
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          WEBULL_APP_KEY: ${{ secrets.WEBULL_APP_KEY }}
          WEBULL_APP_SECRET: ${{ secrets.WEBULL_APP_SECRET }}
          WEBULL_ACCOUNT_ID: ${{ secrets.WEBULL_ACCOUNT_ID }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CONTACT: ${{ secrets.VAPID_CONTACT }}
          PUSH_SUBSCRIPTION_JSON: ${{ secrets.PUSH_SUBSCRIPTION_JSON }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          # The full report — positions, cost basis, portfolio value — stays in
          # data/, which is gitignored and dies with the runner. Only the
          # redacted copy produced by the next step reaches docs/.
          STOCKBOT_DB_PATH: data/stockbot.db
          STOCKBOT_REPORT_DIR: data/reports
        run: |
          # No --local-portfolio here on purpose: load_portfolio() tries Webull
          # when credentials exist and falls back to data/portfolio.json when
          # they do not, which is exactly the behaviour wanted on CI.
          ARGS=""
          # Plain `[ x ] && ARGS=...` would exit non-zero on the last false
          # test and fail the step, since GitHub runs these under `bash -e`.
          if [ -n "${{ inputs.only }}" ]; then ARGS="$ARGS --only ${{ inputs.only }}"; fi
          if [ "${{ inputs.no_news }}" = "true" ]; then ARGS="$ARGS --no-news"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          echo "run_daily.py $ARGS"
          python run_daily.py $ARGS

      # THIS REPOSITORY IS PUBLIC. Nothing derived from the portfolio is ever
      # committed here. The full report is pushed to a separate PRIVATE repo,
      # which Cloudflare Pages serves behind Cloudflare Access.
      - name: Build the dashboard and full report
        # Assembled OUTSIDE the repo checkout, so the clean-repo assertion
        # below can stay absolute: any file under the workspace is a bug.
        run: |
          python tools/make_icons.py
          mkdir -p "$RUNNER_TEMP/site/data" "$RUNNER_TEMP/site/icons"
          cp web/index.html web/app.js web/styles.css web/sw.js web/manifest.json "$RUNNER_TEMP/site/"
          cp web/icons/*.png "$RUNNER_TEMP/site/icons/"
          cp data/reports/latest.json "$RUNNER_TEMP/site/data/latest.json"
          # Dated history, for later backtesting of the DCF leg.
          find data/reports -name '20*.json' -exec cp {} "$RUNNER_TEMP/site/data/" \;
          ls -la "$RUNNER_TEMP/site" "$RUNNER_TEMP/site/data"

      - name: Deploy to Cloudflare Pages
        # Direct Upload: the built site goes straight from the runner to
        # Cloudflare. Nothing is committed anywhere, so the report never enters
        # a git history at all — not even a private one, where it would sit
        # permanently and be exposed by any later visibility or access mistake.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT: ${{ vars.CLOUDFLARE_PROJECT || 'stock-signals' }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set — dashboard not updated"
            exit 0
          fi

          # Idempotent: succeeds on first run, harmless afterwards.
          npx --yes wrangler@3 pages project create "$PROJECT" \
            --production-branch=main 2>/dev/null || echo "project already exists"

          npx --yes wrangler@3 pages deploy "$RUNNER_TEMP/site" \
            --project-name="$PROJECT" --branch=main --commit-dirty=true

      - name: Confirm the public repo stayed clean
        # The failure mode here is irreversible, so assert it rather than
        # assuming the steps above did the right thing.
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::the public checkout has uncommitted changes — something wrote here"
            git status --porcelain
            exit 1
          fi
          if [ -d docs ]; then
            echo "::error::docs/ exists in the public repo — portfolio data may be exposed"
            exit 1
          fi
          echo "public repo is clean: no portfolio-derived files"

      - name: Job summary
        if: always()
        # Job summaries on a public repo are world readable. This prints the
        # signal table only — never a total, a quantity or a P/L.
        run: |
          if [ -f data/reports/latest.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, pathlib
          r = json.loads(pathlib.Path("data/reports/latest.json").read_text(encoding="utf-8"))
          order = {"BUY": 0, "SELL": 1, "WATCH": 2, "HOLD": 3}
          icon = {"BUY": "🟢", "SELL": "🔴", "WATCH": "🟡", "HOLD": "⚪"}
          print(f"## Signals — {r['run_date']}\n")
          print(f"Phase {r['phase']} · {len(r['tickers'])} ticker(s) · amounts withheld\n")
          print("| | Ticker | Price | Fair value | Gap | Rule |")
          print("|---|---|--:|--:|--:|---|")
          for t in sorted(r["tickers"], key=lambda t: (order.get(t["signal"], 9), t["ticker"])):
              fv = t["dcf"]["fair_value"]
              gap = t["dcf"]["valuation_gap_pct"]
              print(
                  f"| {icon.get(t['signal'],'')} {t['signal']} | {t['ticker']} | "
                  f"${t['price']:,.2f} | "
                  f"{'—' if fv is None else f'${fv:,.2f}'} | "
                  f"{'—' if gap is None else f'{gap*100:+.1f}%'} | "
                  f"`{t['decision']['rule']}` |"
              )
          if r.get("errors"):
              print("\n**Run notes**\n")
              for e in r["errors"]:
                  print(f"- {e}")
          print("\n_Not investment advice._")
          PY
          else
            echo "The run produced no report — check the log above." >> "$GITHUB_STEP_SUMMARY"
          fi
