name: Daily run

on:
  schedule:
    # 21:30 UTC on weekdays = 17:30 EDT / 16:30 EST, after the US close.
    # GitHub runs scheduled jobs late under load, and can skip them entirely
    # during incidents. Treat the schedule as best-effort, not a guarantee.
    - cron: "30 21 * * 1-5"
  workflow_dispatch:
    inputs:
      only:
        description: "Comma-separated ticker subset (blank = full universe)"
        required: false
        default: ""
      no_news:
        description: "Skip the news/sentiment leg"
        type: boolean
        default: false
      dry_run:
        description: "Skip the push notification"
        type: boolean
        default: false

# Needed to commit the report back — the runner is wiped after every job, so
# the repo is where run history lives.
permissions:
  contents: write

concurrency:
  group: daily-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore portfolio from secret
        env:
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON }}
        run: |
          mkdir -p data
          if [ -n "$PORTFOLIO_JSON" ]; then
            printf '%s' "$PORTFOLIO_JSON" > data/portfolio.json
            python -c "import json;d=json.load(open('data/portfolio.json'));print(f\"portfolio: {len(d.get('holdings',[]))} holding(s), cash {d.get('cash',0)}\")"
          else
            echo "::warning::PORTFOLIO_JSON secret not set — running watchlist only, no holdings"
            echo '{"cash": 0, "holdings": []}' > data/portfolio.json
          fi

      - name: Run daily analysis
        env:
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          WEBULL_APP_KEY: ${{ secrets.WEBULL_APP_KEY }}
          WEBULL_APP_SECRET: ${{ secrets.WEBULL_APP_SECRET }}
          WEBULL_ACCOUNT_ID: ${{ secrets.WEBULL_ACCOUNT_ID }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CONTACT: ${{ secrets.VAPID_CONTACT }}
          PUSH_SUBSCRIPTION_JSON: ${{ secrets.PUSH_SUBSCRIPTION_JSON }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          # The full report — positions, cost basis, portfolio value — stays in
          # data/, which is gitignored and dies with the runner. Only the
          # redacted copy produced by the next step reaches docs/.
          STOCKBOT_DB_PATH: data/stockbot.db
          STOCKBOT_REPORT_DIR: data/reports
        run: |
          # No --local-portfolio here on purpose: load_portfolio() tries Webull
          # when credentials exist and falls back to data/portfolio.json when
          # they do not, which is exactly the behaviour wanted on CI.
          ARGS=""
          # Plain `[ x ] && ARGS=...` would exit non-zero on the last false
          # test and fail the step, since GitHub runs these under `bash -e`.
          if [ -n "${{ inputs.only }}" ]; then ARGS="$ARGS --only ${{ inputs.only }}"; fi
          if [ "${{ inputs.no_news }}" = "true" ]; then ARGS="$ARGS --no-news"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          echo "run_daily.py $ARGS"
          python run_daily.py $ARGS

      - name: Publish the redacted report
        # THIS REPOSITORY IS PUBLIC. Everything committed below is world
        # readable, so the report is rebuilt from a whitelist that drops every
        # quantity, dollar amount and portfolio weight. Do not add --no-redact
        # here unless the repository is private.
        run: |
          mkdir -p docs/data
          python tools/publish.py --in data/reports/latest.json --out docs/data

      - name: Build the static dashboard
        run: |
          python tools/make_icons.py
          cp web/index.html web/app.js web/styles.css web/sw.js web/manifest.json docs/
          mkdir -p docs/icons && cp web/icons/*.png docs/icons/
          # Pages otherwise runs the tree through Jekyll and drops _-prefixed paths.
          touch docs/.nojekyll

      - name: Verify nothing sensitive is about to be committed
        # Belt and braces: a grep over the actual bytes heading for a public
        # repo, so a regression in publish.py fails the run instead of leaking.
        run: |
          if grep -rlE '"(quantity|cost_basis_per_share|unrealized_pnl|total_cost|market_value|portfolio_value|ticker_weight|sector_weight)"' docs/data/; then
            echo "::error::position data found in docs/ — refusing to publish"
            exit 1
          fi
          echo "docs/ is clean"

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f docs/
          if git diff --staged --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "Daily run $(date -u +%Y-%m-%d)"
          # Another run may have landed while this one was working.
          git pull --rebase --autostash origin ${{ github.ref_name }}
          git push

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.run_number }}
          # Only the redacted copy. Artifacts on a public repository are
          # downloadable by anyone, so the full report is never uploaded.
          path: docs/data/*.json
          retention-days: 30
          if-no-files-found: warn

      - name: Job summary
        if: always()
        run: |
          if [ -f docs/data/latest.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, pathlib
          r = json.loads(pathlib.Path("docs/data/latest.json").read_text(encoding="utf-8"))
          order = {"BUY": 0, "SELL": 1, "WATCH": 2, "HOLD": 3}
          icon = {"BUY": "🟢", "SELL": "🔴", "WATCH": "🟡", "HOLD": "⚪"}
          print(f"## Signals — {r['run_date']}\n")
          # Job summaries are public on a public repo, so this reads the
          # redacted file and never prints a total.
          print(f"Phase {r['phase']} · {len(r['tickers'])} ticker(s) · amounts hidden\n")
          print("| | Ticker | Price | Fair value | Gap | Rule |")
          print("|---|---|--:|--:|--:|---|")
          for t in sorted(r["tickers"], key=lambda t: (order.get(t["signal"], 9), t["ticker"])):
              fv = t["dcf"]["fair_value"]
              gap = t["dcf"]["valuation_gap_pct"]
              print(
                  f"| {icon.get(t['signal'],'')} {t['signal']} | {t['ticker']} | "
                  f"${t['price']:,.2f} | "
                  f"{'—' if fv is None else f'${fv:,.2f}'} | "
                  f"{'—' if gap is None else f'{gap*100:+.1f}%'} | "
                  f"`{t['decision']['rule']}` |"
              )
          if r.get("errors"):
              print("\n**Run notes**\n")
              for e in r["errors"]:
                  print(f"- {e}")
          print("\n_Not investment advice._")
          PY
          else
            echo "The run produced no report — check the log above." >> "$GITHUB_STEP_SUMMARY"
          fi
